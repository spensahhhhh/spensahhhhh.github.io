project:
  type: website
  execute-dir: project
  output-dir: docs
  render:
    - "*.qmd"

execute: 
  freeze: auto

website:
  title: "What's Happening in the Delta?"
  repo-url: https://github.com/nceas-learning-hub/2026_delta_week3
  repo-actions: [issue]
  navbar:
    background: primary
    left:
      - text: "Home"
        href: index.qmd
    right:
    - text: "About"
      href: about.qmd
    - icon: github
      href: https://github.com/nceas-learning-hub/2026_delta_week3
  page-footer: 
    center: "Copyright &copy; 2026, Spencer Fern"
    background: secondary

format:
  html:
    theme:
        light: theme_light.scss
        dark: theme_dark.scss
    mainfont: Open Sans
    toc: true
    link-external-newwindow: true
    link-external-icon: false
